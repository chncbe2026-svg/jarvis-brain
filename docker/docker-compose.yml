version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  jarvis-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jarvis-api
    ports:
      - "3001:8000"
    env_file:
      - ../.env
    depends_on:
      - qdrant
    restart: always

volumes:
  qdrant_data:
