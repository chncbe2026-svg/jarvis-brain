version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  jarvis-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jarvis-api
    ports:
      - "3001:8000"

    environment:
      HF_HUB_OFFLINE: "0"

    env_file:
      - ../.env

    volumes:
      - fastembed_cache:/root/.cache
      - ~/.ssh/id_ed25519:/app/ssh_key:ro
      - ..:/app

    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdrant_data:
  fastembed_cache:
