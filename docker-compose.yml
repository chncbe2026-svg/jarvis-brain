version: "3.9"

services:

  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c ': > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── JARVIS Application ─────────────────────────────────────────────────────
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Groq — provide one or multiple comma-separated keys
      GROQ_API_KEY:     ${GROQ_API_KEY}
      GROQ_KEYS:        ${GROQ_KEYS:-}
      GROQ_MODEL:       ${GROQ_MODEL:-llama-3.3-70b-versatile}
      
      # Qdrant
      QDRANT_HOST:      qdrant
      QDRANT_PORT:      6333
      EMBEDDING_DIM:    384
      
      # Collections
      COLLECTION_PERSONAL:  personal_memory
      COLLECTION_NETWORK:   network_knowledge
      COLLECTION_VENDOR:    vendor_news
      
      # JARVIS Identity
      JARVIS_OWNER:     Dinesh
      JARVIS_VERSION:   "2.0.0"
      
      # Memory
      MEMORY_COLLECTION:    jarvis_memory
      MEMORY_MIN_SCORE:     "0.45"
      
      # RSS
      RSS_INTERVAL_SECONDS: "3600"
      RSS_TIMEOUT_SECONDS:  "30"
      
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - .:/app
      - jarvis_logs:/app/logs
      - jarvis_cache:/home/jarvis/.fastembed_cache
      # Bind SSH key for websocket
      - ~/.ssh/id_ed25519:/app/ssh_key:ro

volumes:
  qdrant_data:
    name: jarvis-qdrant-data
  jarvis_logs:
    name: jarvis-logs
  jarvis_cache:
    name: jarvis-fastembed-cache
